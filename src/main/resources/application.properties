spring.application.name=local-server-management

spring.jvm.arguments=--enable-native-access=ALL-UNNAMED

sprout.mcp.http.port=3001

spring.datasource.url=${POSTGRES_URL}spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect